<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极客禅意时钟</title>
    <style>
        body {
            margin: 0;
            background: #000; /* 深邃黑 */
            color: #fff;       /* 纯净白 */
            /* 优先使用系统字体，确保流畅度，加载文泉驿正黑 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "wqy-zenhei", sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            cursor: none; /* 在网页层隐藏鼠标 */
        }

        #time {
            font-size: 150px; /* 大数字 */
            font-weight: 200;  /* 细体，极简 */
            letter-spacing: -5px; /* 紧凑感 */
            line-height: 1;
        }

        #date {
            font-size: 28px;
            color: #888; /* 灰色，次级信息 */
            margin-top: 10px;
            font-weight: 300;
        }

        #quote {
            margin-top: 40px;
            font-size: 20px;
            color: #555; /* 深灰色，不打扰 */
            font-style: italic;
            border-left: 2px solid #333;
            padding-left: 15px;
            max-width: 80%;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="time">00:00</div>
    <div id="date">YYYY年MM月DD日 星期X</div>
    <div id="quote">“ 先跑通，再重构。”</div>

    <script>
        // 励志语录
        const quotes = [
            "“ 先跑通，再重构。”",
            "“ 所有的硬件Bug，最终都会变成软件特性。”",
            "“ 不要迷信权威，除非那个权威是你昨晚写的代码。”",
            "“ 保持饥饿，保持愚蠢。除非你在调试内核。”",
            "“ 代码是写给人看的，附带能在机器上运行。”"
        ];

        function updateClock() {
            const now = new Date();
            
            // 格式化时间
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('time').textContent = `${hours}:${minutes}`;
            
            // 格式化日期和星期
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('zh-CN', options);

            // 每分钟随机切换一句语录 (只在分钟变化时)
            if (now.getSeconds() === 0) {
                const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
                document.getElementById('quote').textContent = randomQuote;
            }
        }

        // 初始化语录
        document.getElementById('quote').textContent = quotes[0];

        // 启动时钟
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
